<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Maker v2</title>

  <!-- ✅ Load Tailwind CSS -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 🌟 Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

  <!-- ✨ Custom animation -->
  <style>
    body { animation: fadeIn 1s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-xl p-10 text-center w-full max-w-md">
    <h1 class="text-4xl font-bold text-indigo-600 mb-4">Welcome to Invitation Maker v2</h1>
    <p class="text-gray-700 mb-6">Choose an option to start creating your invitation.</p>

    <div class="flex justify-center gap-4">
      <a href="/login" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-800 transition">Login</a>
      <a href="/signup" class="bg-pink-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-pink-800 transition">Signup</a>
    </div>
  </div>

</body>
</html>
