<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invitation Maker Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex flex-col items-center justify-center">

  <!-- Header -->
  <div class="w-full flex justify-between items-center px-8 py-4">
    <h1 class="text-3xl font-bold text-white">Invitation Maker Dashboard</h1>
    <a href="{{ url_for('logout') }}" 
       class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-800 transition">
       Logout
    </a>
  </div>

  <!-- Categories Grid -->
  <div class="grid grid-cols-2 gap-8 max-w-4xl mt-10">
    <!-- Wedding -->
    <a href="/editor/Wedding/1" class="bg-white shadow-lg rounded-xl p-8 text-center hover:scale-105 transition">
      <h2 class="text-2xl font-bold text-indigo-600">Wedding</h2>
      <p class="text-gray-600 mt-2">Elegant templates for weddings</p>
    </a>

    <!-- Birthday -->
    <a href="/editor/Birthday/1" class="bg-white shadow-lg rounded-xl p-8 text-center hover:scale-105 transition">
      <h2 class="text-2xl font-bold text-pink-600">Birthday</h2>
      <p class="text-gray-600 mt-2">Fun templates for birthdays</p>
    </a>

    <!-- Party -->
    <a href="/editor/Party/1" class="bg-white shadow-lg rounded-xl p-8 text-center hover:scale-105 transition">
      <h2 class="text-2xl font-bold text-green-600">Party</h2>
      <p class="text-gray-600 mt-2">Trendy templates for parties</p>
    </a>

    <!-- Corporate -->
    <a href="/editor/Corporate/1" class="bg-white shadow-lg rounded-xl p-8 text-center hover:scale-105 transition">
      <h2 class="text-2xl font-bold text-blue-600">Corporate</h2>
      <p class="text-gray-600 mt-2">Professional templates for events</p>
    </a>
  </div>

</body>
</html>
