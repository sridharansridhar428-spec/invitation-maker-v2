<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup - Invitation Maker v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-xl p-10 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-pink-600 mb-6">Create Your Account</h1>
    
    <form action="/signup" method="POST" class="space-y-5">
      <div>
        <label class="block text-gray-700 font-semibold">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none">
      </div>
      <div>
        <label class="block text-gray-700 font-semibold">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none">
      </div>
      <button type="submit"
              class="w-full bg-pink-600 text-white py-2 rounded-lg font-semibold hover:bg-pink-800 transition">
        Sign Up
      </button>
    </form>

    <p class="text-center text-gray-600 mt-6">
      Already have an account?
      <a href="/login" class="text-pink-600 font-semibold hover:underline">Login</a>
    </p>
  </div>

</body>
</html>
