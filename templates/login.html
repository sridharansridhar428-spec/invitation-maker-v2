<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Invitation Maker v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-xl p-10 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">Welcome Back</h1>
    
    <form action="/login" method="POST" class="space-y-5">
      <div>
        <label class="block text-gray-700 font-semibold">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>
      <div>
        <label class="block text-gray-700 font-semibold">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-800 transition">
        Login
      </button>
    </form>

    <p class="text-center text-gray-600 mt-6">
      Don’t have an account?
      <a href="/signup" class="text-indigo-600 font-semibold hover:underline">Sign up</a>
    </p>
  </div>

</body>
</html>
